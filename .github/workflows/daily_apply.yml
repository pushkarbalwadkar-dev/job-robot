name: SFMC Job Finder

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  run-robot:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Robot
        run: python robot.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: jobs
          path: jobs.csv
