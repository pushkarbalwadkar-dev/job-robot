name: SFMC Job Robot

# Schedule to run daily at 2:00 AM, and also allows manual trigger
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3️⃣ Install dependencies
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Run Robot
      - name: Run SFMC Job Robot
        env:
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          GLASSDOOR_EMAIL: ${{ secrets.GLASSDOOR_EMAIL }}
          GLASSDOOR_PASSWORD: ${{ secrets.GLASSDOOR_PASSWORD }}
          INDEED_EMAIL: ${{ secrets.INDEED_EMAIL }}
          INDEED_PASSWORD: ${{ secrets.INDEED_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python robot.py

      # 5️⃣ Upload applied_jobs.csv as artifact (using v4)
      - name: Upload applied_jobs.csv
        uses: actions/upload-artifact@v4
        with:
          name: applied-jobs
          path: applied_jobs.csv
